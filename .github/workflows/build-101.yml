name: Build Clarity APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── Inject API key safely using Python (avoids shell quote conflicts) ───
      - name: Inject API key
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 - << 'PYEOF'
          import os, re

          key = os.environ.get("ANTHROPIC_API_KEY", "")
          placeholder = "CLARITY_BUILD_KEY_PLACEHOLDER"

          with open("index.html", "r", encoding="utf-8") as f:
              content = f.read()

          if key and key.startswith("sk-"):
              content = content.replace(placeholder, key)
              print("API key injected successfully.")
          else:
              print("No valid ANTHROPIC_API_KEY secret found — users will enter it manually in Settings.")

          with open("index.html", "w", encoding="utf-8") as f:
              f.write(content)
          PYEOF

      # ── Java 21 (required by Capacitor's Android project) ──────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ── Node.js + Capacitor ─────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Create Capacitor config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.clarity.journal",
            "appName": "Clarity",
            "webDir": "www",
            "android": {
              "allowMixedContent": true
            },
            "server": {
              "androidScheme": "https"
            }
          }
          EOF

      - name: Prepare web directory
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets into Android project
        run: npx cap sync android

      # ── App icon ────────────────────────────────────────────────────────────
      - name: Generate app icons
        run: |
          sudo apt-get install -y imagemagick

          cat > icon_base.svg << 'EOF'
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
            <rect width="1024" height="1024" rx="200" fill="#0d0f14"/>
            <circle cx="512" cy="512" r="300" fill="none" stroke="#7eb8a4" stroke-width="40"/>
            <path d="M512 320 Q620 420 512 512 Q404 604 512 704" fill="none" stroke="#7eb8a4" stroke-width="36" stroke-linecap="round"/>
            <circle cx="512" cy="512" r="48" fill="#7eb8a4"/>
          </svg>
          EOF

          declare -A SIZES=(
            ["android/app/src/main/res/mipmap-mdpi"]=48
            ["android/app/src/main/res/mipmap-hdpi"]=72
            ["android/app/src/main/res/mipmap-xhdpi"]=96
            ["android/app/src/main/res/mipmap-xxhdpi"]=144
            ["android/app/src/main/res/mipmap-xxxhdpi"]=192
          )

          for DIR in "${!SIZES[@]}"; do
            SIZE="${SIZES[$DIR]}"
            mkdir -p "$DIR"
            convert -background none -resize "${SIZE}x${SIZE}" icon_base.svg "${DIR}/ic_launcher.png"
            convert -background none -resize "${SIZE}x${SIZE}" icon_base.svg "${DIR}/ic_launcher_round.png"
            echo "Generated ${SIZE}x${SIZE} icon in $DIR"
          done

      # ── Android SDK ─────────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      # ── Patch app name ───────────────────────────────────────────────────────
      - name: Set app name
        run: |
          sed -i 's|<string name="app_name">.*</string>|<string name="app_name">Clarity</string>|g' \
            android/app/src/main/res/values/strings.xml

      # ── Build APK ───────────────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── Upload APK ──────────────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Clarity-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Print download instructions
        run: |
          echo "✅ Build complete!"
          echo ""
          echo "To install your APK:"
          echo "  1. Go to Actions tab → this run → Artifacts"
          echo "  2. Download 'Clarity-debug', unzip it"
          echo "  3. Transfer app-debug.apk to your Android device"
          echo "  4. Enable 'Install from unknown sources' in Android settings"
          echo "  5. Tap the APK to install"
